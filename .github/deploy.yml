name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy

    steps:
      - uses: actions/checkout@v4

      - name: Substitute KV namespace IDs
        run: |
          sed -i "s/PLACEHOLDER_KV_DEV_ID/${{ secrets.RATINGS_KV_ID }}/g" wrangler.toml
          sed -i "s/PLACEHOLDER_KV_PROD_ID/${{ secrets.RATINGS_KV_PROD_ID }}/g" wrangler.toml

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          environment: production