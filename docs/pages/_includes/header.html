<header class="header" role="banner">
  <div class="header-inner">

    <!-- Left: logo + version badge -->
    <a class="header-logo" href="{{ '/index.html' | relative_url }}" aria-label="Schema Validator Docs home">
      <span class="header-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
      </span>
      <span class="header-logo-text">Schema Validator</span>
      {% if site.docs_version %}
      <span class="docs-version-badge">Docs v{{ site.docs_version }}</span>
      {% endif %}
    </a>

    <!-- Centre: search bar (absolutely centred so it stays in the true middle
         regardless of how wide the logo or actions column is) -->
    <label class="header-search" for="search-input">
      <input id="search-input" class="header-search-input" type="search"
             placeholder="Search documentation..." autocomplete="off"
             aria-label="Search documentation">
      <div id="search-results" class="search-results"
           role="listbox" aria-label="Search results" hidden></div>
    </label>

    <!-- Right: theme toggle + mobile menu -->
    <div class="header-actions">
      <label class="bb8-toggle" title="Toggle dark mode">
        <input type="checkbox" class="bb8-toggle__checkbox" id="theme-toggle" aria-label="Toggle dark mode">
        <div class="bb8-toggle__container">
          <div class="bb8-toggle__scenery">
            <div class="bb8-toggle__cloud"></div>
            <div class="bb8-toggle__cloud"></div>
            <div class="bb8-toggle__cloud"></div>
            <div class="gomrassen"></div>
            <div class="hermes"></div>
            <div class="chenini"></div>
            <div class="bb8-toggle__star"></div>
            <div class="bb8-toggle__star"></div>
            <div class="bb8-toggle__star"></div>
            <div class="bb8-toggle__star"></div>
            <div class="bb8-toggle__star"></div>
            <div class="bb8-toggle__star"></div>
            <div class="bb8-toggle__star"></div>
            <div class="tatto-1"></div>
            <div class="tatto-2"></div>
          </div>
          <div class="bb8">
            <div class="bb8__head-container">
              <div class="bb8__antenna"></div>
              <div class="bb8__antenna"></div>
              <div class="bb8__head"></div>
            </div>
            <div class="bb8__body">
              <div class="artificial__hidden"></div>
            </div>
            <div class="bb8__shadow"></div>
          </div>
        </div>
      </label>
      <button id="sidebar-toggle" class="header-btn mobile-only" type="button"
              aria-controls="sidebar" aria-expanded="false" aria-label="Toggle menu"></button>
    </div>

  </div>
</header>
