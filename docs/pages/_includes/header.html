<header class="ghd-header" role="banner">

    <span aria-hidden="true">◆</span>
    <span>Schema Validator Docs</span>
  </a>

  <div class="ghd-header-controls">
    <label class="ghd-search-wrap" for="search-input">
      <span class="sr-only">Search documentation pages</span>

    <button id="sidebar-toggle" class="ghd-btn mobile-only" type="button" aria-controls="sidebar" aria-expanded="false">Menu</button>
