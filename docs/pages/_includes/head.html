<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: 'Schema Validator project documentation' }}">
<link rel="stylesheet" href="{{ '/assets/css/modern-docs.css' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script>
  // Jekyll site configuration for JavaScript
  window.site = {
    feedback_worker_url: '{{ site.feedback_worker_url }}',
    baseurl: '{{ site.baseurl }}'
  };
</script>
<script defer src="{{ '/assets/js/modern-docs.js' | relative_url }}"></script>
