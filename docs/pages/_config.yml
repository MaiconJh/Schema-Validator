title: Schema Validator Docs
url: "https://maiconjh.github.io"
baseurl: "/Schema-Validator"
docs_version: "1.6.0"
latest_docs_version: "1.6.0"
latest_docs_url: "/Schema-Validator/"
plugin_version_range: "1.6.0"
markdown: kramdown
highlighter: rouge
permalink: pretty
# Feedback worker URL (Cloudflare Workers)
# Configure this after deploying the worker
feedback_worker_url: "https://feedback-handler-prod.maiconjairhansen.workers.dev"
# AI chat worker URL (Cloudflare Workers)
# Configure this after deploying the chat worker
ai_assistant_worker_url: "https://schema-validator-ai-chat-prod.maiconjairhansen.workers.dev/v1/chat"
# Public Turnstile site key used only when the chat worker requests verification
ai_assistant_turnstile_site_key: ""
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
      toc: true
      nav_exclude: false
include:
  - _includes
  - _layouts
exclude:
  - Gemfile
  - Gemfile.lock
