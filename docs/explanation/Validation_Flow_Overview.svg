<svg width="1100" height="280" viewBox="0 0 1100 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow -->
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b949e"/>
    </marker>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <!-- Boxes -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#c9d1d9" text-anchor="middle">

    <!-- Plugin Load -->
    <rect x="40" y="100" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" filter="url(#shadow)"/>
    <text x="130" y="125">Plugin Load</text>
    <text x="130" y="145">(Startup)</text>

    <!-- Skript Event -->
    <rect x="280" y="100" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" filter="url(#shadow)"/>
    <text x="370" y="125">Skript Event</text>
    <text x="370" y="145">(Trigger)</text>

    <!-- Load Schema -->
    <rect x="520" y="100" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" filter="url(#shadow)"/>
    <text x="610" y="125">Load Schema</text>
    <text x="610" y="145">&amp; Data</text>

    <!-- Run Validation -->
    <rect x="760" y="100" width="180" height="70" rx="8" fill="#161b22" stroke="#30363d" filter="url(#shadow)"/>
    <text x="850" y="125">Run Validation</text>
    <text x="850" y="145">Engine</text>

    <!-- Return Result -->
    <rect x="760" y="200" width="180" height="60" rx="8" fill="#161b22" stroke="#30363d" filter="url(#shadow)"/>
    <text x="850" y="225">Return Result</text>
    <text x="850" y="245">&amp; Errors</text>
  </g>

  <!-- Arrows -->
  <g stroke="#8b949e" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="220" y1="135" x2="280" y2="135"/>
    <line x1="460" y1="135" x2="520" y2="135"/>
    <line x1="700" y1="135" x2="760" y2="135"/>
    <line x1="850" y1="170" x2="850" y2="200"/>
  </g>

</svg>
