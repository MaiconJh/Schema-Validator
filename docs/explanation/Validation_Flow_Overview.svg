<svg width="1100" height="320" viewBox="0 0 1100 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrow with better visibility -->
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L0,12 L12,6 Z" fill="#58a6ff"/>
    </marker>
    
    <!-- Arrow for return flow (different color) -->
    <marker id="arrowReturn" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M0,0 L0,12 L12,6 Z" fill="#f78166"/>
    </marker>

    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Glow effect for emphasis -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0d1117"/>

  <!-- Title -->
  <text x="550" y="30" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#e6edf3" text-anchor="middle">Validation Flow Overview</text>
  
  <!-- Subtitle line -->
  <line x1="100" y1="45" x2="1000" y2="45" stroke="#30363d" stroke-width="1"/>

  <!-- Main Flow Boxes -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#e6edf3" text-anchor="middle">

    <!-- Step 1: Plugin Load - Blue theme -->
    <rect x="40" y="90" width="180" height="75" rx="10" fill="#1f3a5f" stroke="#388bfd" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="120" font-weight="600">Plugin Load</text>
    <text x="130" y="145" font-size="12" fill="#8b949e">(Startup)</text>

    <!-- Step 2: Skript Event - Blue theme -->
    <rect x="280" y="90" width="180" height="75" rx="10" fill="#1f3a5f" stroke="#388bfd" stroke-width="2" filter="url(#shadow)"/>
    <text x="370" y="120" font-weight="600">Skript Event</text>
    <text x="370" y="145" font-size="12" fill="#8b949e">(Trigger)</text>

    <!-- Step 3: Load Schema & Data - Blue theme -->
    <rect x="520" y="90" width="180" height="75" rx="10" fill="#1f3a5f" stroke="#388bfd" stroke-width="2" filter="url(#shadow)"/>
    <text x="610" y="120" font-weight="600">Load Schema</text>
    <text x="610" y="145" font-size="12" fill="#8b949e">& Data</text>

    <!-- Step 4: Run Validation Engine - Green theme -->
    <rect x="760" y="90" width="180" height="75" rx="10" fill="#1a4731" stroke="#3fb950" stroke-width="2" filter="url(#shadow)"/>
    <text x="850" y="120" font-weight="600">Run Validation</text>
    <text x="850" y="145" font-size="12" fill="#8b949e">Engine</text>

    <!-- Step 5: Return Result - Orange theme -->
    <rect x="760" y="200" width="180" height="65" rx="10" fill="#4a1919" stroke="#f85149" stroke-width="2" filter="url(#shadow)"/>
    <text x="850" y="228" font-weight="600">Return Result</text>
    <text x="850" y="250" font-size="12" fill="#8b949e">& Errors</text>
  </g>

  <!-- Connecting Arrows - Main Flow -->
  <g stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="220" y1="127" x2="280" y2="127"/>
    <line x1="460" y1="127" x2="520" y2="127"/>
    <line x1="700" y1="127" x2="760" y2="127"/>
  </g>

  <!-- Return Arrow - Different color -->
  <g stroke="#f78166" stroke-width="2.5" fill="none" marker-end="url(#arrowReturn)">
    <path d="M850,165 L850,200"/>
  </g>

  <!-- Labels for arrows -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">
    <text x="250" y="118">triggers</text>
    <text x="490" y="118">loads</text>
    <text x="730" y="118">processes</text>
    <text x="880" y="185" fill="#f78166">returns</text>
  </g>

  <!-- Legend -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e">
    <rect x="40" y="270" width="12" height="12" rx="2" fill="#1f3a5f" stroke="#388bfd"/>
    <text x="58" y="280">Input/Trigger</text>
    
    <rect x="160" y="270" width="12" height="12" rx="2" fill="#1a4731" stroke="#3fb950"/>
    <text x="178" y="280">Processing</text>
    
    <rect x="290" y="270" width="12" height="12" rx="2" fill="#4a1919" stroke="#f85149"/>
    <text x="308" y="280">Output</text>
  </g>

</svg>
