name: Schema-Validator
version: '1.4.0'
main: com.maiconjh.schemacr.core.SchemaValidatorPlugin
description: Paper plugin for JSON/YAML schema validation with optional Skript integration.
api-version: '1.21'
author: MaiconJH
website: https://github.com/MaiconJH/Schema-Validator
commands:
  schemavalidator:
    description: Administrative commands for schema inspection, validation, and reload.
    aliases: [sv, schema]
    usage: /<command> help
softdepend:
  - Skript
  - skBee
permissions:
  schemavalidator.use:
    description: Allows read-only Schema-Validator commands.
    default: op
  schemavalidator.reload:
    description: Allows schema directory reload commands.
    default: op
  schemavalidator.admin:
    description: Allows all Schema-Validator commands.
    default: op
    children:
      schemavalidator.use: true
      schemavalidator.reload: true
libraries:
  - com.fasterxml.jackson.core:jackson-databind:2.17.2
  - com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.17.2
  - org.yaml:snakeyaml:2.2
