# Schema-Validator Configuration
# ================================

# Directory where schema files are stored (relative to plugin folder)
# Can be absolute path or relative to plugin data folder
schema-directory: "schemas"

# Automatically load all schemas from the schema-directory on plugin enable
# When enabled, all .json and .yaml/.yml files in the directory will be loaded
auto-load: true

# Enable caching of loaded schemas
# When enabled, schemas are cached in memory for faster validation
cache-enabled: true

# Validate schemas when they are loaded
# When enabled, validates schema structure and reports errors
validation-on-load: true
