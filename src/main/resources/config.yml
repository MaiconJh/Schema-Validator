# Schema-Validator Configuration
# ================================

# Directory where schema files are stored (relative to plugin folder)
# Can be absolute path or relative to plugin data folder
schema-directory: "schemas"

# Directory where data files are stored (relative to plugin folder)
# Data files with 'schema-validation-path' key will be validated against the referenced schema
data-directory: "data"

# Automatically load all schemas from the schema-directory on plugin enable
# When enabled, all .json and .yaml/.yml files in the directory will be loaded
auto-load: true

# Enable caching of loaded schemas
# When enabled, schemas are cached in memory for faster validation
cache-enabled: true

# Validate schemas when they are loaded
# When enabled, validates schema structure and reports errors
# DISABLED: Example schemas contain oneOf/if/then/else that fail self-validation
validation-on-load: false

# Automatically validate data files on plugin enable/reload
# When enabled, files in data-directory with 'schema-validation-path' key will be validated
auto-validate-data-files: true

# Fail-fast mode for unsupported keywords
# When enabled, the plugin will throw an exception when loading a schema
# that contains unsupported keywords instead of just logging a warning
# RECOMMENDED: Enable this in production to catch schema issues early
strict-mode: false
