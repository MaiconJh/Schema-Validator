name = "schema-validator-ai-chat"
main = "worker.js"
compatibility_date = "2026-03-29"
workers_dev = true

[vars]
ALLOWED_ORIGINS = "https://maiconjh.github.io,http://localhost:4000,http://localhost:3000"
DOCS_BASE_URL = "https://maiconjh.github.io/Schema-Validator/"
DOCS_SEARCH_URL = "https://maiconjh.github.io/Schema-Validator/search.json"
UPSTREAM_API_URL = "https://api.kilo.ai/api/gateway/chat/completions"
UPSTREAM_MODEL = "kilo-auto/free"
UPSTREAM_TIMEOUT_MS = "25000"
MAX_INPUT_CHARS = "6000"
MAX_HISTORY_MESSAGES = "8"
MAX_CONTEXT_SECTIONS = "4"
MAX_DOC_MATCHES = "5"
MAX_OUTPUT_TOKENS = "1800"
TEMPERATURE = "0.3"
SEARCH_CACHE_TTL = "300"
COOKIE_NAME = "sv_chat_session"
COOKIE_MAX_AGE = "2592000"
BURST_LIMIT = "5"
BURST_WINDOW_SEC = "60"
SUSTAINED_LIMIT = "20"
SUSTAINED_WINDOW_SEC = "900"
DAILY_LIMIT = "80"
DAILY_WINDOW_SEC = "86400"
MAX_CONCURRENCY = "2"
SOFT_COOLDOWN_SEC = "60"
HARD_COOLDOWN_SEC = "900"
BAN_DURATION_SEC = "86400"
VIOLATION_WINDOW_SEC = "3600"
VIOLATION_LIMIT = "5"
OFFTOPIC_WINDOW_SEC = "1800"
OFFTOPIC_LIMIT = "5"
CHALLENGE_AFTER_VIOLATIONS = "2"
CHALLENGE_AFTER_OFFTOPIC = "3"
TURNSTILE_ENFORCED = "false"
REQUIRE_CHALLENGE_FOR_SUSPICIOUS = "true"
LOG_SAMPLE_RATE = "1"

[[durable_objects.bindings]]
name = "CHAT_GUARD"
class_name = "ChatAbuseCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAbuseCoordinator"]

